<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="blur1" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="blur2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="#000000"/>

  <!-- outer soft glow halo -->
  <g filter="url(#blur1)">
    <circle cx="256" cy="256" r="130" fill="none" stroke="#ff1414" stroke-width="44" opacity="0.7"/>
  </g>
  <!-- inner tighter glow -->
  <g filter="url(#blur2)">
    <circle cx="256" cy="256" r="130" fill="none" stroke="#ff2a2a" stroke-width="34" opacity="0.9"/>
  </g>

  <!-- the solid neon red ring (uniform, no white line) -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="#ff2020" stroke-width="30"/>

  <!-- the bottom gap: a wedge of black cutting fully through the ring -->
  <rect x="245" y="330" width="22" height="120" fill="#000000"/>
</svg>
